# Granite 4.0-H-Small-FP8 — deployed as Deployment+Service
# No Red Hat modelcar image exists yet, so we download from HuggingFace at startup.
# Uses the same Red Hat vLLM image as other models.

model:
  name: granite-4-0-h-small-fp8
  displayName: Granite 4.0-H Small FP8
  huggingfaceId: ibm-granite/granite-4.0-h-small-FP8

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

resources:
  limits:
    cpu: "6"
    memory: 48Gi
    nvidia.com/gpu: "1"
  requests:
    cpu: "4"
    memory: 32Gi
    nvidia.com/gpu: "1"

extraArgs:
  - --enable-auto-tool-choice
  - --tool-call-parser=hermes
  - --gpu-memory-utilization=0.95
  - --max-model-len=8192

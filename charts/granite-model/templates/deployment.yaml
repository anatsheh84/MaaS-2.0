apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.model.name }}
  labels:
    app: {{ .Values.model.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.model.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.model.name }}
    spec:
      containers:
      - name: vllm
        image: {{ .Values.image }}
        args:
        - --model={{ .Values.model.huggingfaceId }}
        - --served-model-name={{ .Values.model.name }}
        - --port=8000
        {{- range .Values.extraArgs }}
        - {{ . }}
        {{- end }}
        env:
        - name: HF_HUB_OFFLINE
          value: "0"
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory }}
            nvidia.com/gpu: {{ index .Values.resources.limits "nvidia.com/gpu" | quote }}
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory }}
            nvidia.com/gpu: {{ index .Values.resources.requests "nvidia.com/gpu" | quote }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu
        effect: NoSchedule

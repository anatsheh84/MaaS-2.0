# Default values for llama-stack-instance
# This is a YAML-formatted file.

# Cluster configuration, for templating routes
deployer:
  domain: apps.cluster.example.com
# Model configuration
model:
  name: qwen3-4b-instruct
  displayName: Qwen 3 4B Instruct 2507
# Persistent storage for LlamaStack data (vector stores, files, metadata)
storage:
  size: 5Gi
# Pod resources — reduced since embeddings now run on shared GPU service
resources:
  limits:
    cpu: "2"
    memory: 8Gi
  requests:
    cpu: "500m"
    memory: 1Gi

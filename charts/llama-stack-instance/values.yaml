# Default values for llama-stack-instance
# This is a YAML-formatted file.

# Cluster configuration, for templating routes
deployer:
  domain: apps.cluster.example.com

# LLM models — each gets its own remote::vllm provider in LlamaStack.
# All models are RAG-enabled (file_search uses the shared embedding service).
models:
  - name: qwen3-4b-instruct
    displayName: Qwen3 4B Instruct 2507
  - name: llama-3-1-8b-instruct-fp8
    displayName: Llama 3.1 8B Instruct FP8
  - name: mistral-small-24b-fp8
    displayName: Mistral Small 3.1 24B Instruct FP8
  - name: phi-4-instruct-w8a8
    displayName: Phi-4 Instruct W8A8
  - name: granite-4-0-h-small-fp8
    displayName: Granite 4.0-H Small FP8
    url: http://granite-4-0-h-small-fp8.llm.svc.cluster.local:8000/v1
    maxTokens: 4096

# Persistent storage for LlamaStack data (vector stores, files, metadata)
storage:
  size: 5Gi

# Pod resources — reduced since embeddings now run on shared GPU service
resources:
  limits:
    cpu: "2"
    memory: 8Gi
  requests:
    cpu: "500m"
    memory: 1Gi

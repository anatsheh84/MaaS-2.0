# Modelcar builds for models without Red Hat modelcar images
# Each build downloads from HuggingFace and creates an OCI modelcar image
builds:
  - name: granite-modelcar
    huggingfaceId: ibm-granite/granite-4.0-h-tiny-FP8
    resources:
      limits:
        cpu: "4"
        memory: 16Gi
      requests:
        cpu: "2"
        memory: 8Gi

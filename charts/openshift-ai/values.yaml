---
enableUserTelemetry: false

# If set, will override the deployment replica counts
dashboardReplicas: 1
operatorReplicas: 1

dataScienceCluster:
  create: true
  version: v1
  components:
    kserve:
      managementState: Managed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    trustyai:
      managementState: Managed
    ray:
      managementState: Removed
    kueue:
      managementState: Removed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    dashboard:
      managementState: Managed
    # trainingoperator was renamed to trainer in RHOAI 3.3.
    # trainer must be Managed because it installs the LeaderWorkerSet (LWS) CRD
    # required by KServe 3.3 multi-node reconciliation. Without it all
    # LLMInferenceServices fail with:
    #   no matches for kind "LeaderWorkerSet" in version "leaderworkerset.x-k8s.io/v1"
    trainer:
      managementState: Managed
    trainingoperator:
      managementState: Removed
    feastoperator: {}
    llamastackoperator:
      managementState: Removed

dataScienceClusterInitialization:
  serviceMesh:
    managementState: Removed

acceleratorProfiles: []
hardwareProfiles: []

admins: []
userGroups:
  - system:authenticated

dashboardConfig: {}

defaultWorkbenchPvcSize: 20Gi
showJupyterInEnabledApplications: true
notebookIdleCulling:
  enabled: true
  timeoutInMinutes: 240

modelServerSizes:
  - name: Small
    resources:
      limits:
        cpu: "2"
        memory: 8Gi
      requests:
        cpu: "1"
        memory: 4Gi
  - name: Medium
    resources:
      limits:
        cpu: "8"
        memory: 10Gi
      requests:
        cpu: "4"
        memory: 8Gi
  - name: Large
    resources:
      limits:
        cpu: "10"
        memory: 20Gi
      requests:
        cpu: "6"
        memory: 16Gi

notebookSizes:
  - name: Small
    resources:
      limits:
        cpu: "2"
        memory: 8Gi
      requests:
        cpu: "1"
        memory: 8Gi
  - name: Medium
    resources:
      limits:
        cpu: "6"
        memory: 24Gi
      requests:
        cpu: "3"
        memory: 24Gi
  - name: Large
    resources:
      limits:
        cpu: "14"
        memory: 56Gi
      requests:
        cpu: "7"
        memory: 56Gi
  - name: X Large
    resources:
      limits:
        cpu: "30"
        memory: 120Gi
      requests:
        cpu: "15"
        memory: 120Gi

# Model Registry instances
# List of ModelRegistry CRs to create in rhoai-model-registries namespace
# Empty by default — enable in values-llmaas.yaml
modelRegistries: []
# - name: maas-registry
#   dbPassword: changeme

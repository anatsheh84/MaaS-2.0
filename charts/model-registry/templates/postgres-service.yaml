{{- range .Values.modelRegistries }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "model-registry.postgresServiceName" .name }}
  namespace: rhoai-model-registries
  labels:
    app: {{ .name }}
    app.kubernetes.io/name: {{ include "model-registry.postgresServiceName" .name }}
    app.kubernetes.io/part-of: {{ .name }}
  annotations:
    # Wave 1 — same wave as PVC and Deployment. Service must exist before
    # the Deployment pod starts so DNS resolves immediately on first boot.
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: {{ .name }}
    app.kubernetes.io/name: {{ include "model-registry.postgresServiceName" .name }}
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP
{{- end }}

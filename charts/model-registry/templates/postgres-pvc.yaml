{{- range .Values.modelRegistries }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "model-registry.postgresServiceName" .name }}
  namespace: rhoai-model-registries
  labels:
    app: {{ .name }}
    app.kubernetes.io/part-of: {{ .name }}
  annotations:
    # Wave 1 — same wave as Deployment and Service.
    # gp3-csi uses WaitForFirstConsumer: the PVC only binds when a Pod
    # mounts it. SkipHealthCheck prevents ArgoCD from blocking within
    # wave 1 waiting for Bound — the Deployment (also wave 1) provides
    # the consumer pod that causes the volume to bind.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipHealthCheck=true
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .storageSize | default "10Gi" }}
  storageClassName: {{ .storageClass | default "gp3-csi" }}
{{- end }}

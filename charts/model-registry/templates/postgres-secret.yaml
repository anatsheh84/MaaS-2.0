{{- range .Values.modelRegistries }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "model-registry.postgresSecretName" .name }}
  namespace: rhoai-model-registries
  labels:
    app: {{ .name }}
    app.kubernetes.io/part-of: {{ .name }}
  # No sync-wave annotation — wave 0, same as the Deployment that mounts
  # this secret via secretKeyRef. If this secret is in a later wave than
  # the Deployment, the Postgres pod fails to start with
  # 'secret "maas-registry-postgres" not found'.
type: Opaque
stringData:
  database-user: {{ .dbUser | default "mlmduser" }}
  database-password: {{ .dbPassword }}
  database-name: {{ .dbName | default "model_registry" }}
{{- end }}

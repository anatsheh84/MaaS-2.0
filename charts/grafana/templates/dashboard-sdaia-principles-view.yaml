apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: sdaia-ai-governance-principles-view
  namespace: grafana
  labels:
    app: sdaia-governance
    compliance: sdaia-ethics-principles
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/instance: grafana
  json: |
    {
      "title": "SDAIA AI Ethics Principles \u2014 Compliance View",
      "description": "SDAIA AI Ethics Principles v2.0 compliance dashboard. Organised by principle with contextual metric explanations. Namespace: llm | Platform: OpenShift AI 3.2",
      "tags": ["sdaia", "ai-governance", "compliance", "openshift-ai", "principles-view"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "id": 1, "type": "text", "title": "SDAIA AI Governance \u2014 Compliance Dashboard",
          "gridPos": {"h": 5, "w": 24, "x": 0, "y": 0},
          "options": {
            "mode": "html",
            "content": "<div style='background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;border-radius:10px;border-left:6px solid #cc0000;font-family:sans-serif'>\n<div style='display:flex;align-items:center;gap:16px;margin-bottom:12px'>\n  <span style='font-size:2.5em'>\ud83c\uddf8\ud83c\udde6</span>\n  <div>\n    <h1 style='color:#fff;margin:0;font-size:1.6em'>SDAIA AI Ethics Principles \u2014 Live Compliance Dashboard</h1>\n    <p style='color:#aaa;margin:4px 0 0'>Saudi Data & AI Authority (SDAIA) | AI Ethics Principles v2.0 \u2014 September 2023</p>\n  </div>\n</div>\n<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px'>\n  <div style='background:rgba(255,255,255,0.07);padding:10px;border-radius:6px;border-top:3px solid #4CAF50'>\n    <div style='color:#4CAF50;font-weight:bold;font-size:0.85em'>PRINCIPLE 5</div>\n    <div style='color:#fff;font-size:0.9em'>Reliability &amp; Safety</div>\n    <div style='color:#aaa;font-size:0.75em'>Model performance &amp; capacity</div>\n  </div>\n  <div style='background:rgba(255,255,255,0.07);padding:10px;border-radius:6px;border-top:3px solid #2196F3'>\n    <div style='color:#2196F3;font-weight:bold;font-size:0.85em'>PRINCIPLE 7</div>\n    <div style='color:#fff;font-size:0.9em'>Accountability &amp; Responsibility</div>\n    <div style='color:#aaa;font-size:0.75em'>Audit trails &amp; incident tracking</div>\n  </div>\n  <div style='background:rgba(255,255,255,0.07);padding:10px;border-radius:6px;border-top:3px solid #9C27B0'>\n    <div style='color:#9C27B0;font-weight:bold;font-size:0.85em'>PLATFORM</div>\n    <div style='color:#fff;font-size:0.9em'>OpenShift AI 3.2 / KServe / vLLM</div>\n    <div style='color:#aaa;font-size:0.75em'>Namespace: llm | 4 active models</div>\n  </div>\n  <div style='background:rgba(255,255,255,0.07);padding:10px;border-radius:6px;border-top:3px solid #FF9800'>\n    <div style='color:#FF9800;font-weight:bold;font-size:0.85em'>SCOPE</div>\n    <div style='color:#fff;font-size:0.9em'>llama-3.1-8b | mistral-24b</div>\n    <div style='color:#aaa;font-size:0.75em'>phi-4 | qwen3-4b</div>\n  </div>\n</div>\n</div>"
          }
        },
        {"id": 2, "type": "row", "title": "\ud83d\udcd7 Principle 5 \u2014 Reliability & Safety", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}},
        {
          "id": 3, "type": "text", "title": "",
          "gridPos": {"h": 3, "w": 24, "x": 0, "y": 6},
          "options": {"mode": "html", "content": "<div style='background:linear-gradient(90deg,rgba(76,175,80,0.15),rgba(76,175,80,0.03));padding:14px 18px;border-radius:8px;border-left:4px solid #4CAF50;font-family:sans-serif'>\n<span style='color:#4CAF50;font-weight:bold;font-size:1em'>\ud83d\udcd7 SDAIA Principle 5: Reliability & Safety</span>\n<p style='color:#ccc;margin:6px 0 0;font-size:0.88em'>AI systems must be <b style='color:#fff'>technically sound, robust, and continuously monitored</b> to ensure they operate as intended and do not pose risk of harm. Risk management including model interpretability, bias detection, and performance monitoring must be embedded across the full AI lifecycle.</p>\n<p style='color:#888;margin:6px 0 0;font-size:0.8em'>\ud83d\udccc Hover over the <b>\u24d8</b> icon on each panel below for detailed metric context and remediation guidance.</p>\n</div>"}
        },
        {
          "id": 4, "type": "stat", "title": "\ud83e\udde0 KV Cache Utilization %",
          "description": "SDAIA Principle 5 \u2014 Reliability & Safety\n\nKV cache is GPU memory used by vLLM. >85% risks request drops.\n\nThresholds: Green 0-70%, Yellow 70-85%, Red >85%",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 9},
          "targets": [{"expr": "kserve_vllm:kv_cache_usage_perc{namespace='llm'} * 100", "legendFormat": "{{llm_isvc_name}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "orientation": "auto"},
          "fieldConfig": {"defaults": {"unit": "percent", "displayName": "${__field.labels.llm_isvc_name}", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}, "noValue": "0"}}
        },
        {
          "id": 5, "type": "stat", "title": "\u23f3 Requests Waiting in Queue",
          "description": "SDAIA Principle 5 \u2014 Reliability & Safety\n\nRequests waiting for GPU resources. Green 0-4, Yellow 5-19, Red >=20.",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 9},
          "targets": [{"expr": "kserve_vllm:num_requests_waiting{namespace='llm'}", "legendFormat": "{{llm_isvc_name}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "orientation": "auto"},
          "fieldConfig": {"defaults": {"unit": "short", "displayName": "${__field.labels.llm_isvc_name}", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 20}]}, "noValue": "0"}}
        },
        {
          "id": 6, "type": "timeseries", "title": "\u26a1 Time to First Token \u2014 P50 & P95 (1h window)",
          "description": "SDAIA Principle 5 \u2014 TTFT P50/P95. <0.5s Excellent, 0.5-2s Acceptable, >2s Poor (red).",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le, llm_isvc_name)(rate(kserve_vllm:time_to_first_token_seconds_bucket{namespace='llm'}[1h])))", "legendFormat": "p50 \u2014 {{llm_isvc_name}}"},
            {"expr": "histogram_quantile(0.95, sum by (le, llm_isvc_name)(rate(kserve_vllm:time_to_first_token_seconds_bucket{namespace='llm'}[1h])))", "legendFormat": "p95 \u2014 {{llm_isvc_name}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {
          "id": 7, "type": "timeseries", "title": "\ud83e\ude99 Token Throughput \u2014 Generation Tokens/s",
          "description": "SDAIA Principle 5 \u2014 Generation tokens/s. Sudden drops indicate model degradation.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "targets": [{"expr": "sum by (llm_isvc_name)(rate(kserve_vllm:generation_tokens_total{namespace='llm'}[2m]))", "legendFormat": "{{llm_isvc_name}}"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {
          "id": 8, "type": "timeseries", "title": "\ud83e\uddee Avg E2E Latency per Request",
          "description": "SDAIA Principle 5 \u2014 Average E2E latency = sum/count. High mistral latency is expected (long-form generation).",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "targets": [{"expr": "kserve_vllm:e2e_request_latency_seconds_sum{namespace='llm'} / kserve_vllm:e2e_request_latency_seconds_count{namespace='llm'}", "legendFormat": "avg \u2014 {{llm_isvc_name}}"}],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {"id": 9, "type": "row", "title": "\ud83d\udcd8 Principle 7 \u2014 Accountability & Responsibility", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21}},
        {
          "id": 10, "type": "text", "title": "",
          "gridPos": {"h": 3, "w": 24, "x": 0, "y": 22},
          "options": {"mode": "html", "content": "<div style='background:linear-gradient(90deg,rgba(33,150,243,0.15),rgba(33,150,243,0.03));padding:14px 18px;border-radius:8px;border-left:4px solid #2196F3;font-family:sans-serif'>\n<span style='color:#2196F3;font-weight:bold;font-size:1em'>\ud83d\udcd8 SDAIA Principle 7: Accountability & Responsibility</span>\n<p style='color:#ccc;margin:6px 0 0;font-size:0.88em'>Entities must maintain <b style='color:#fff'>clear ownership, audit trails, and incident response mechanisms</b> for all AI systems throughout their lifecycle. SDAIA requires a designated Responsible AI Officer (RAIO), documented AI Ethics Plans, annual reporting with performance KPIs, and incident escalation pathways to SDAIA.</p>\n<p style='color:#888;margin:6px 0 0;font-size:0.8em'>\ud83d\udccc Hover over the <b>\u24d8</b> icon on each panel below for detailed metric context and remediation guidance.</p>\n</div>"}
        },
        {
          "id": 11, "type": "stat", "title": "\u2705 Total Requests \u2014 Audit Counter",
          "description": "SDAIA Principle 7 \u2014 Cumulative total of all chat completion requests. Primary audit trail counter.",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 25},
          "targets": [{"expr": "sum by (llm_isvc_name)(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm'})", "legendFormat": "{{llm_isvc_name}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "orientation": "auto"},
          "fieldConfig": {"defaults": {"unit": "short", "displayName": "${__field.labels.llm_isvc_name}", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "noValue": "0"}}
        },
        {
          "id": 12, "type": "stat", "title": "\u26a0\ufe0f Error Rate % \u2014 Incident Indicator",
          "description": "SDAIA Principle 7 \u2014 Error rate. Green 0-1.9%, Yellow 2-4.9%, Red >=5%. Any sustained breach requires RAIO incident report.",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 25},
          "targets": [
            {"expr": "100 * sum by (llm_isvc_name)(rate(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm', status!='2xx'}[5m])) / sum by (llm_isvc_name)(rate(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm'}[5m]))", "legendFormat": "{{llm_isvc_name}}", "refId": "A"},
            {"expr": "sum by (llm_isvc_name)(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm'}) * 0", "legendFormat": "{{llm_isvc_name}}", "refId": "B"}
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "orientation": "auto"},
          "fieldConfig": {"defaults": {"unit": "percent", "displayName": "${__field.labels.llm_isvc_name}", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 2}, {"color": "red", "value": 5}]}, "noValue": "0"}}
        },
        {
          "id": 13, "type": "timeseries", "title": "\ud83d\udcc8 Request Volume Over Time \u2014 Activity Audit Trail",
          "description": "SDAIA Principle 7 \u2014 Rate of requests per minute per model. Primary activity timeline for audit purposes.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 25},
          "targets": [{"expr": "sum by (llm_isvc_name)(rate(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm'}[2m])) * 60", "legendFormat": "{{llm_isvc_name}}"}],
          "fieldConfig": {"defaults": {"unit": "reqpm", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {
          "id": 14, "type": "timeseries", "title": "\ud83d\udd04 Request Abort Rate \u2014 Unfulfilled User Requests",
          "description": "SDAIA Principle 7 \u2014 Aborted requests represent users who did not receive expected AI output. Sustained rate requires RAIO incident documentation.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 29},
          "targets": [{"expr": "sum by (llm_isvc_name)(rate(kserve_vllm:request_success_total{namespace='llm', finished_reason='abort'}[5m]))", "legendFormat": "{{llm_isvc_name}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {
          "id": 15, "type": "piechart", "title": "\ud83c\udfc1 Request Completion Reasons \u2014 Quality Breakdown",
          "description": "SDAIA Principle 7 \u2014 stop=normal, length=truncated (max_tokens hit), abort=terminated. High length rate may indicate prompt engineering issues.",
          "gridPos": {"h": 8, "w": 8, "x": 12, "y": 29},
          "targets": [{"expr": "sum by (finished_reason)(kserve_vllm:request_success_total{namespace='llm'})", "legendFormat": "{{finished_reason}}"}],
          "options": {"legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]}},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}}
        },
        {
          "id": 16, "type": "timeseries", "title": "\ud83d\udcca Prompt vs Generation Tokens \u2014 Usage Pattern Audit",
          "description": "SDAIA Principle 7 \u2014 Unusual shifts in prompt-to-generation ratios may indicate prompt injection or jailbreak attempts.",
          "gridPos": {"h": 8, "w": 4, "x": 20, "y": 29},
          "targets": [
            {"expr": "sum by (llm_isvc_name)(rate(kserve_vllm:prompt_tokens_total{namespace='llm'}[2m]))", "legendFormat": "prompt \u2014 {{llm_isvc_name}}"},
            {"expr": "sum by (llm_isvc_name)(rate(kserve_vllm:generation_tokens_total{namespace='llm'}[2m]))", "legendFormat": "generated \u2014 {{llm_isvc_name}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10}, "color": {"mode": "palette-classic"}}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}}
        },
        {"id": 17, "type": "row", "title": "\ud83d\udccb AI System Register \u2014 SDAIA Mandatory Inventory (Principle 7)", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 37}},
        {
          "id": 18, "type": "text", "title": "",
          "gridPos": {"h": 2, "w": 24, "x": 0, "y": 38},
          "options": {"mode": "html", "content": "<div style='background:linear-gradient(90deg,rgba(255,152,0,0.15),rgba(255,152,0,0.03));padding:12px 18px;border-radius:8px;border-left:4px solid #FF9800;font-family:sans-serif'>\n<span style='color:#FF9800;font-weight:bold'>\ud83d\udccb SDAIA AI System Register</span>\n<span style='color:#ccc;font-size:0.88em;margin-left:12px'>SDAIA Principle 7 requires all adopting entities to maintain a register of deployed AI systems. This table serves as the <b style='color:#fff'>live AI system inventory</b> for audit and annual reporting purposes.</span>\n</div>"}
        },
        {
          "id": 19, "type": "table", "title": "\ud83e\udd16 Active AI Systems \u2014 Compliance Register",
          "description": "SDAIA Principle 7 \u2014 Live inventory of all AI models currently deployed. Required for SDAIA audit and annual AI Ethics report.",
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 40},
          "targets": [
            {"expr": "sum by (llm_isvc_name, namespace, model_name)(kserve_http_requests_total{handler='/v1/chat/completions', namespace='llm'})", "legendFormat": "", "instant": true, "format": "table", "refId": "A"},
            {"expr": "kserve_vllm:kv_cache_usage_perc{namespace='llm'} * 100", "legendFormat": "", "instant": true, "format": "table", "refId": "B"},
            {"expr": "kserve_vllm:e2e_request_latency_seconds_sum{namespace='llm'} / kserve_vllm:e2e_request_latency_seconds_count{namespace='llm'}", "legendFormat": "", "instant": true, "format": "table", "refId": "C"}
          ],
          "options": {"sortBy": [{"displayName": "Model Name", "desc": false}]},
          "fieldConfig": {
            "defaults": {"custom": {"align": "left"}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "llm_isvc_name"}, "properties": [{"id": "displayName", "value": "Model Name"}]},
              {"matcher": {"id": "byName", "options": "namespace"}, "properties": [{"id": "displayName", "value": "Namespace"}]},
              {"matcher": {"id": "byName", "options": "Value #A"}, "properties": [{"id": "displayName", "value": "Total Requests"}, {"id": "unit", "value": "short"}]},
              {"matcher": {"id": "byName", "options": "Value #B"}, "properties": [{"id": "displayName", "value": "KV Cache %"}, {"id": "unit", "value": "percent"}, {"id": "custom.displayMode", "value": "color-background"}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}]},
              {"matcher": {"id": "byName", "options": "Value #C"}, "properties": [{"id": "displayName", "value": "Avg E2E Latency"}, {"id": "unit", "value": "s"}]},
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "model_name"}, "properties": [{"id": "custom.hidden", "value": true}]}
            ]
          }
        }
      ]
    }

          "description": "SDAIA Principle 7 \u2014 Accountability & Responsibility\n\nWHAT THIS MEASURES:\nBreakdown of how requests completed across all models:\n\u2022 stop: Normal completion \u2014 model reached a natural end point \u2705\n\u2022 length: Truncated \u2014 model hit the max_tokens limit \u26a0\ufe0f\n\u2022 abort: Terminated \u2014 request was cancelled or timed out \u274c\n\nSDAIA COMPLIANCE CONTEXT:\nThis breakdown is required evidence for your AI Ethics annual report. Specifically:\n\u2022 High 'length' rate suggests models are being asked to generate beyond their configured limit \u2014 may indicate misconfiguration or prompt engineering issues that affect output quality\n\u2022 High 'abort' rate requires incident documentation\n\u2022 The 'stop' percentage is your primary quality indicator\n\nCURRENT CLUSTER: stop=133, length=11, abort=0 \u2014 92% healthy completion rate.",

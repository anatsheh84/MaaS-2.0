apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "milvus.etcdServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "milvus.etcdServiceName" . }}
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: {{ include "milvus.etcdServiceName" . }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ include "milvus.etcdServiceName" . }}
        {{- include "milvus.labels" . | nindent 8 }}
    spec:
      containers:
      - name: etcd
        image: {{ .Values.etcd.image }}
        command:
        - etcd
        - --advertise-client-urls=http://0.0.0.0:2379
        - --listen-client-urls=http://0.0.0.0:2379
        - --data-dir=/etcd-data
        - --auto-compaction-mode=revision
        - --auto-compaction-retention=1000
        - --max-request-bytes=10485760
        - --quota-backend-bytes=4294967296
        ports:
        - name: client
          containerPort: 2379
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 2379
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 2379
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.etcd.resources.requests.cpu }}
            memory: {{ .Values.etcd.resources.requests.memory }}
          limits:
            cpu: {{ .Values.etcd.resources.limits.cpu }}
            memory: {{ .Values.etcd.resources.limits.memory }}
        volumeMounts:
        - name: etcd-data
          mountPath: /etcd-data
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
      - name: etcd-data
        persistentVolumeClaim:
          claimName: {{ include "milvus.etcdServiceName" . }}

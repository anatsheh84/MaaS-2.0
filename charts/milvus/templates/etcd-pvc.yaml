apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "milvus.etcdServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "milvus.etcdServiceName" . }}
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.etcd.storageSize }}
  storageClassName: {{ .Values.etcd.storageClass }}

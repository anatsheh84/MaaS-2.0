apiVersion: v1
kind: Service
metadata:
  name: {{ include "milvus.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "milvus.fullname" . }}
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "milvus.fullname" . }}
  ports:
  - name: grpc
    port: 19530
    targetPort: 19530
    protocol: TCP
  - name: http-metrics
    port: 9091
    targetPort: 9091
    protocol: TCP

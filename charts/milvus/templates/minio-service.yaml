apiVersion: v1
kind: Service
metadata:
  name: {{ include "milvus.minioServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "milvus.minioServiceName" . }}
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "milvus.minioServiceName" . }}
  ports:
  - name: api
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: console
    port: 9001
    targetPort: 9001
    protocol: TCP

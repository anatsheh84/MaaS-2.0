apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milvus.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "milvus.fullname" . }}
    {{- include "milvus.labels" . | nindent 4 }}
data:
  milvus.yaml: |
    etcd:
      endpoints:
        - {{ include "milvus.etcdServiceName" . }}:2379
      rootPath: milvus

    minio:
      address: {{ include "milvus.minioServiceName" . }}
      port: 9000
      accessKeyID: {{ .Values.minio.rootUser }}
      secretAccessKey: {{ .Values.minio.rootPassword }}
      bucketName: {{ .Values.minio.defaultBucket }}
      useSSL: false

    log:
      level: info

    common:
      storageType: remote

    mq:
      type: rocksmq

    rocksmq:
      path: /var/lib/milvus/rdb_data

    localStorage:
      path: /var/lib/milvus/data

    queryNode:
      localStoragePath: /var/lib/milvus/data

    proxy:
      port: 19530

    rootCoord:
      port: 53100

    dataCoord:
      port: 13333

    queryCoord:
      port: 19531

    dataNode:
      port: 21124

    queryNode:
      port: 21123

    indexNode:
      port: 21121

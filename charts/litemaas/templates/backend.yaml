---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-backup
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.pvcSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-database
          image: {{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c '\q' 2>/dev/null; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready!"
          env:
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litemaas_db
      containers:
        - name: backend
          image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litemaas_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-secret
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.oauth.clientId }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: oauth-client-secret
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: admin-api-key
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-api-key
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-master-key
            - name: LITELLM_URL
              value: "https://litellm-{{ .Values.namespace }}.{{ .Values.deployer.domain }}"
            - name: LITELLM_DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litellm_db
            - name: FRONTEND_URL
              value: "https://litemaas-{{ .Values.namespace }}.{{ .Values.deployer.domain }}"
            - name: AUTH_PROVIDER
              value: openshift
            - name: OPENSHIFT_OAUTH_BASE_URL
              value: "https://oauth-openshift.{{ .Values.deployer.domain }}"
            - name: NODE_ENV
              value: production
            {{- if eq .Values.nodeTlsRejectUnauthorized "0" }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: '0'
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: backup-storage
              mountPath: /app/backups
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backend-backup
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-backup
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.pvcSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-database
          image: {{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c '\q' 2>/dev/null; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready!"
          env:
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litemaas_db
      containers:
        - name: backend
          image: {{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}
          ports:
            - containerPort: 8080
              name: http
          env:
            # ── Server ────────────────────────────────────────────────────────
            - name: HOST
              value: '0.0.0.0'
            - name: PORT
              value: '8080'
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            # ── Database ──────────────────────────────────────────────────────
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litemaas_db?sslmode=disable
            # ── Auth / JWT ────────────────────────────────────────────────────
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: '24h'
            # ── OAuth ─────────────────────────────────────────────────────────
            - name: AUTH_PROVIDER
              value: openshift
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.oauth.clientId }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: oauth-client-secret
            - name: OAUTH_ISSUER
              value: "https://oauth-openshift.{{ .Values.deployer.domain }}"
            - name: OAUTH_CALLBACK_URL
              value: "https://litemaas-{{ .Values.namespace }}.{{ .Values.deployer.domain }}/api/auth/callback"
            # ── CORS ──────────────────────────────────────────────────────────
            - name: CORS_ORIGIN
              value: "https://litemaas-{{ .Values.namespace }}.{{ .Values.deployer.domain }}"
            # ── Admin ─────────────────────────────────────────────────────────
            - name: ADMIN_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: admin-api-key
            # ── LiteLLM ───────────────────────────────────────────────────────
            - name: LITELLM_API_URL
              value: "https://litellm-{{ .Values.namespace }}.{{ .Values.deployer.domain }}"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-api-key
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-master-key
            - name: LITELLM_DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litellm_db
            # ── Redis ─────────────────────────────────────────────────────────
            - name: REDIS_HOST
              value: litellm-redis
            - name: REDIS_PORT
              value: '6379'
            # ── Rate limiting defaults ─────────────────────────────────────────
            - name: RATE_LIMIT_MAX
              value: '1000'
            - name: RATE_LIMIT_TIME_WINDOW
              value: '5m'
            # ── User defaults ─────────────────────────────────────────────────
            - name: DEFAULT_USER_MAX_BUDGET
              value: '100'
            - name: DEFAULT_USER_TPM_LIMIT
              value: '100000'
            - name: DEFAULT_USER_RPM_LIMIT
              value: '120'
            # ── Storage ───────────────────────────────────────────────────────
            - name: BACKUP_STORAGE_PATH
              value: /data/backups
            # ── TLS ───────────────────────────────────────────────────────────
            {{- if eq .Values.nodeTlsRejectUnauthorized "0" }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: '0'
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: backup-storage
              mountPath: /data/backups
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backend-backup
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http

# PostgreSQL - init configmap, statefulset, service, PVC
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    app.kubernetes.io/part-of: litemaas
data:
  init.sql: |
    CREATE DATABASE litemaas_db;
    CREATE DATABASE litellm_db;
    GRANT ALL PRIVILEGES ON DATABASE litemaas_db TO litemaas_admin;
    GRANT ALL PRIVILEGES ON DATABASE litellm_db TO litemaas_admin;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    app.kubernetes.io/part-of: litemaas
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: litemaas_admin
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: postgres-init-script
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClass }}
        storageClassName: {{ .Values.postgres.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

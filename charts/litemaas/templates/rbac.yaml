# RoleBindings for LiteMaaS admin users in the litemaas namespace.
# OpenShift Groups are managed in bootstrap/templates/extra-resources/groups.yaml
# (ArgoCD structured merge diff cannot handle user.openshift.io/v1 Kind=Group in Helm charts)
{{- range .Values.rbac.adminUsers }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litemaas-admin-{{ . }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/part-of: litemaas
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ . }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: litemaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
          command:
            - sh
            - -c
            - |
              until curl -sf http://backend:8080/api/v1/health/ready; do
                echo "Waiting for backend..."
                sleep 5
              done
              echo "Backend is ready! Starting frontend..."
      containers:
        - name: frontend
          image: {{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BACKEND_URL
              value: 'http://backend:8080'
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: litemaas
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: litemaas
spec:
  host: litemaas-{{ .Values.namespace }}.{{ .Values.deployer.domain }}
  to:
    kind: Service
    name: frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-redis
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm-redis
    app.kubernetes.io/part-of: litemaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-redis
  template:
    metadata:
      labels:
        app: litellm-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-redis
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm-redis
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: litellm-redis
  ports:
    - port: 6379
      targetPort: 6379

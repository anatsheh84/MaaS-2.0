---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm
    app.kubernetes.io/part-of: litemaas
type: Opaque
stringData:
  database-url: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litellm_db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm
    component: ai-proxy
    app.kubernetes.io/part-of: litemaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
        component: ai-proxy
    spec:
      initContainers:
        - name: wait-for-database
          image: {{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c '\q' 2>/dev/null; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready!"
          env:
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litellm_db
      containers:
        - name: litellm
          image: {{ .Values.images.litellm.repository }}:{{ .Values.images.litellm.tag }}
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: pg-admin-password
            - name: DATABASE_URL
              value: postgresql://litemaas_admin:$(PG_ADMIN_PASSWORD)@postgres:5432/litellm_db
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-master-key
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-ui-username
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: litellm-ui-password
            - name: LITELLM_MODE
              value: 'PRODUCTION'
            - name: STORE_MODEL_IN_DB
              value: 'True'
            - name: DISABLE_SCHEMA_UPDATE
              value: 'false'
            - name: REDIS_HOST
              value: 'litellm-redis'
            - name: REDIS_PORT
              value: '6379'
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm
    app.kubernetes.io/part-of: litemaas
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: litellm
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm
    app.kubernetes.io/part-of: litemaas
spec:
  host: litellm-{{ .Values.namespace }}.{{ .Values.deployer.domain }}
  to:
    kind: Service
    name: litellm
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Shared GPU embedding model for all LlamaStack instances
# ────────────────────────────────────────────────────────
# Runs on GPU via vLLM — serves /v1/embeddings endpoint.
# Downloads from HuggingFace at startup (vLLM 3.2.5 bug with modelcar paths — re-test with 3.3.0).
# Snowflake Arctic Embed L v2.0: 8192 context, 1024 dim, multilingual

namespace: llm

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0

models:
  - name: snowflake-embed
    displayName: Snowflake Arctic Embed L v2.0
    hfModel: Snowflake/snowflake-arctic-embed-l-v2.0
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --task=embed
      - --max-model-len=8192
      - --gpu-memory-utilization=0.3

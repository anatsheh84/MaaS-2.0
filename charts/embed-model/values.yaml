# Shared GPU embedding model for all LlamaStack instances
# ────────────────────────────────────────────────────────
# Runs on GPU via vLLM — serves /v1/embeddings endpoint.
# All LlamaStack pods point to this service via remote::vllm.

namespace: llm

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

models:
  - name: nomic-embed
    displayName: Nomic Embed Text v1.5
    uri: oci://registry.redhat.io/rhelai1/modelcar-nomic-embed-text-v1.5:1.5
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --task=embed
      - --max-model-len=8192
      - --gpu-memory-utilization=0.5

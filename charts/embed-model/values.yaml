# Shared GPU embedding model for all LlamaStack instances
# ────────────────────────────────────────────────────────
# Runs on GPU via vLLM — serves /v1/embeddings endpoint.
# Snowflake Arctic Embed L v2.0: 8192 context, 1024 dim, multilingual

namespace: llm

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

models:
  - name: snowflake-embed
    displayName: Snowflake Arctic Embed L v2.0
    uri: oci://quay.io/anatsheh84/modelcar-snowflake-arctic-embed-l-v2.0:1.5
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --task=embed
      - --max-model-len=8192
      - --gpu-memory-utilization=0.3

# Shared GPU embedding model for all LlamaStack instances
# ────────────────────────────────────────────────────────
# Runs on GPU via vLLM — serves /v1/embeddings endpoint.
# Nomic Embed Text v1.5: 8192 context, 768 dim, no matryoshka validation issues

namespace: llm

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0

models:
  - name: nomic-embed
    displayName: Nomic Embed Text v1.5
    hfModel: nomic-ai/nomic-embed-text-v1.5
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --max-model-len=2048
      - --gpu-memory-utilization=0.3
      - --trust-remote-code

# Shared GPU embedding model for all LlamaStack instances
# ────────────────────────────────────────────────────────
# Runs on GPU via vLLM — serves /v1/embeddings endpoint.
# Downloads model from HuggingFace at startup (no modelcar needed).

namespace: llm

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

models:
  - name: granite-embed
    displayName: Granite Embedding 125M English
    hfModel: ibm-granite/granite-embedding-125m-english
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --task=embed
      - --max-model-len=512
      - --gpu-memory-utilization=0.3
      - --override-pooler-config={"pooling_type":"CLS","normalize":true}

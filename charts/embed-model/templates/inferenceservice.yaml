{{- range .Values.models }}
---
# Shared GPU embedding model served via vLLM.
# Deployed as Deployment+Service (not LLMInferenceService) because vLLM 3.2.5
# has a bug validating /mnt/models as a HuggingFace repo ID for encoder models.
# Downloads model from HuggingFace at startup instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ .name }}
spec:
  replicas: {{ .replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
      - name: vllm
        image: {{ .image | default $.Values.image }}
        command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - "--served-model-name={{ .name }}"
        - "--model={{ .hfModel }}"
        {{- range .extraArgs }}
        - {{ . | quote }}
        {{- end }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: HF_HOME
          value: /tmp/hf-cache
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRANSFORMERS_OFFLINE
          value: "0"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
        resources:
          {{- toYaml .resources | nindent 10 }}
        volumeMounts:
        - mountPath: /dev/shm
          name: shm
        - mountPath: /tmp/hf-cache
          name: hf-cache
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: shm
      - emptyDir:
          sizeLimit: 5Gi
        name: hf-cache
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ .name }}
spec:
  selector:
    app: {{ .name }}
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
{{- end }}

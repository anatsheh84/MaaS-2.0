{{- range .Values.models }}
---
# Shared GPU embedding model served via vLLM.
# All LlamaStack instances point to this service via remote::vllm provider.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    openshift.io/display-name: {{ .displayName }}
    opendatahub.io/hardware-profile-name: nvidia-l40s-single-gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
spec:
  model:
    name: {{ .name }}
    uri: {{ .uri }}
  replicas: {{ .replicas | default 1 }}
  template:
    containers:
    - name: main
      image: {{ .image | default $.Values.image }}
      command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      args:
      - "--served-model-name={{ .name }}"
      - --model=/mnt/models
      - --enable-ssl-refresh
      - --ssl-certfile=/var/run/kserve/tls/tls.crt
      - --ssl-keyfile=/var/run/kserve/tls/tls.key
      {{- range .extraArgs }}
      - {{ . | quote }}
      {{- end }}
      ports:
      - containerPort: 8000
        name: http
        protocol: TCP
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
      resources:
        {{- toYaml .resources | nindent 8 }}
      volumeMounts:
      - mountPath: /dev/shm
        name: shm
    nodeSelector:
      nvidia.com/gpu.present: "true"
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Equal
      value: l40-gpu
    volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 2Gi
      name: shm
{{- end }}

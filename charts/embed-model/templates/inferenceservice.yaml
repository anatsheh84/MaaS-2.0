{{- range .Values.models }}
---
# Embedding model served via LLMInferenceService (same CRD as LLM models).
# CPU-only: no HardwareProfile, no nodeSelector, no GPU tolerations.
# Exposed as an internal ClusterIP service only — not behind the MaaS gateway.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    openshift.io/display-name: {{ .displayName }}
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
spec:
  model:
    name: {{ .name }}
    uri: {{ .uri }}
  replicas: {{ .replicas | default 1 }}
  template:
    containers:
    - name: main
      image: {{ .image | default $.Values.image }}
      command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      args:
      - "--served-model-name={{ .name }}"
      - --model=/mnt/models
      {{- toYaml .extraArgs | nindent 6 }}
      ports:
      - containerPort: 8000
        name: http
        protocol: TCP
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
      resources:
        {{- toYaml .resources | nindent 8 }}
      volumeMounts:
      - mountPath: /dev/shm
        name: shm
    volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 2Gi
      name: shm
{{- end }}

image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0

models:
  - name: qwen3-4b-instruct
    displayName: Qwen3 4B Instruct 2507
    uri: oci://quay.io/jharmison/models:qwen--qwen3-4b-instruct-2507-modelcar
    hardwareProfile: nvidia-l40s-single-gpu
    resources:
      limits:
        cpu: "6"
        memory: 48Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 32Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-auto-tool-choice
      - --tool-call-parser=hermes
      - --gpu-memory-utilization=0.95
      - --max-model-len=131072
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu

  - name: llama-3-1-8b-instruct-fp8
    displayName: Llama 3.1 8B Instruct FP8
    uri: oci://registry.redhat.io/rhelai1/modelcar-llama-3-1-8b-instruct-fp8-dynamic:1.5
    hardwareProfile: nvidia-l40s-single-gpu
    resources:
      limits:
        cpu: "6"
        memory: 24Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-auto-tool-choice
      - --tool-call-parser=llama3_json
      - --chat-template=/opt/app-root/template/tool_chat_template_llama3.1_json.jinja
      - --gpu-memory-utilization=0.95
      - --max-model-len=131072
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu

  - name: mistral-small-24b-fp8
    displayName: Mistral Small 3.1 24B Instruct FP8
    uri: oci://registry.redhat.io/rhelai1/modelcar-mistral-small-3-1-24b-instruct-2503-fp8-dynamic:1.5
    hardwareProfile: nvidia-l40s-single-gpu
    resources:
      limits:
        cpu: "6"
        memory: 32Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 24Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-auto-tool-choice
      - --tool-call-parser=mistral
      - --chat-template=/opt/app-root/template/tool_chat_template_mistral3.jinja
      - --gpu-memory-utilization=0.95
      - --max-model-len=65536
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu

  - name: phi-4-instruct-w8a8
    enabled: false
    displayName: Phi-4 Instruct W8A8
    uri: oci://registry.redhat.io/rhelai1/modelcar-phi-4-quantized-w8a8:1.5
    hardwareProfile: nvidia-l40s-single-gpu
    resources:
      limits:
        cpu: "6"
        memory: 32Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 24Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-auto-tool-choice
      - --tool-call-parser=hermes
      - --chat-template=/opt/app-root/template/tool_chat_template_phi4_mini.jinja
      - --gpu-memory-utilization=0.95
      - --max-model-len=16384
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu

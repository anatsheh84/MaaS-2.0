---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: sso.{{ .Values.domain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    # RHBK operator creates the service as '<cr-name>-service', not '<cr-name>'
    name: keycloak-service
    weight: 100

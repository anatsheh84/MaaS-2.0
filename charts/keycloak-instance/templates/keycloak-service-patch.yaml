---
# Annotation-only SSA patch for the RHBK-operator-managed keycloak-service.
#
# Why this file exists:
#   The RHBK operator creates 'keycloak-service' but does NOT add the OpenShift
#   Service CA annotation on its own. Without the annotation, Service CA never
#   generates the 'keycloak-tls' Secret, and the keycloak-0 pod fails to start
#   with: MountVolume.SetUp failed — secret "keycloak-tls" not found
#
# SSA ownership model:
#   - We declare ONLY metadata.annotations here so ArgoCD owns just that field.
#   - The RHBK operator exclusively owns spec.ports, spec.selector, etc.
#   - No SSA field ownership conflict between ArgoCD and the operator.
#
# Effect:
#   Service CA sees the annotation and auto-generates the 'keycloak-tls'
#   TLS Secret signed for keycloak-service.keycloak.svc, which the Keycloak
#   CR mounts via spec.http.tlsSecret: keycloak-tls.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    service.beta.openshift.io/serving-cert-secret-name: keycloak-tls

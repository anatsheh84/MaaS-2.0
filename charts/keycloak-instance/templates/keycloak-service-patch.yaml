---
# Patch the operator-managed keycloak-service to trigger Service CA cert generation.
# The RHBK operator creates this service; we only manage the annotation here.
# Service CA will create the 'keycloak-tls' Secret automatically once it sees
# the serving-cert annotation, which the Keycloak CR references via http.tlsSecret.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    service.beta.openshift.io/serving-cert-secret-name: keycloak-tls
spec:
  # Ports are operator-managed; we declare them here only for SSA field ownership.
  # ArgoCD uses ServerSideApply so only our owned fields (annotations) are enforced.
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
    - name: management
      port: 9000
      protocol: TCP
      targetPort: 9000
  selector:
    app: keycloak
    app.kubernetes.io/instance: keycloak
    app.kubernetes.io/managed-by: keycloak-operator

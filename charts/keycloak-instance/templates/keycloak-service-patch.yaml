---
# Pre-create keycloak-service with the OpenShift Service CA annotation.
#
# Why this file exists:
#   The RHBK operator creates 'keycloak-service' but does NOT add the OpenShift
#   Service CA annotation on its own. Without it, Service CA never generates the
#   'keycloak-tls' Secret, and the keycloak-0 pod fails to start with:
#     MountVolume.SetUp failed - secret "keycloak-tls" not found
#
# Why spec.ports is included:
#   On a fresh cluster, 'keycloak-service' does not exist yet when this wave
#   runs (the RHBK operator only creates it after seeing the Keycloak CR in
#   wave 0). Kubernetes rejects Service creation without spec.ports
#   ("Required value"). We pre-create the service here with the annotation and
#   a minimal port definition so that Service CA can immediately generate
#   'keycloak-tls' before the Keycloak pod starts in wave 0.
#
# SSA ownership:
#   ServerSideApply=true is set on this Application. ArgoCD owns the annotation
#   and the port entry declared here. The RHBK operator reconciles the service
#   and may add additional ports/fields - these do not conflict because SSA
#   field ownership is per-field, not per-resource.
#
# Effect:
#   Service CA generates 'keycloak-tls' (signed for keycloak-service.keycloak.svc)
#   well before the Keycloak pod starts, allowing it to mount the TLS secret
#   successfully on first boot.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    service.beta.openshift.io/serving-cert-secret-name: keycloak-tls
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443

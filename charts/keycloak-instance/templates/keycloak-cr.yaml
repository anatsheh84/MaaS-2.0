---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-pgsql
    database: {{ .Values.db.name }}
    usernameSecret:
      name: keycloak-pgsql-user
      key: user
    passwordSecret:
      name: keycloak-pgsql-user
      key: password
  hostname:
    hostname: sso.{{ .Values.domain }}
    strict: false
    strictBackchannel: false
  http:
    httpEnabled: true
  ingress:
    enabled: false
  transaction:
    xaEnabled: true
  additionalOptions:
    - name: enable-recovery
      value: "true"

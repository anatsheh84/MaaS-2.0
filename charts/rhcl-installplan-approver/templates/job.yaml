---
# Approves the OLM install plan that contains rhcl-operator.
#
# Why this is needed:
#   OpenShift pre-installs servicemeshoperator3 with installPlanApproval: Manual
#   (annotation: ingress.operator.openshift.io/owned). When OLM resolves
#   rhcl-operator's dependency on servicemeshoperator3 it bundles both into one
#   install plan. Because one subscription is Manual, the combined plan blocks.
#   This Job finds and approves it so Kuadrant CRDs install automatically.
#
# Behaviour:
#   Retries for up to 10 minutes, only approves plans containing rhcl-operator,
#   exits cleanly if already installed. BeforeHookCreation gives a fresh run.
apiVersion: batch/v1
kind: Job
metadata:
  name: approve-rhcl-installplan
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 660
  template:
    spec:
      serviceAccountName: rhcl-installplan-approver
      restartPolicy: OnFailure
      containers:
      - name: approver
        image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -euo pipefail

          # Exit immediately if rhcl-operator is already fully installed.
          # This covers re-deploys and clusters where Kuadrant was pre-installed.
          STATE=$(oc get subscription rhcl-operator -n openshift-operators \
            -o jsonpath='{.status.state}' 2>/dev/null || true)
          if [ "$STATE" = "AtLatestKnown" ]; then
            echo "rhcl-operator is AtLatestKnown - already installed, nothing to do."
            exit 0
          fi

          echo "Watching for a pending rhcl-operator install plan..."
          for i in $(seq 1 60); do
            PLAN=$(oc get installplan -n openshift-operators -o json 2>/dev/null \
              | jq -r '
                  .items[]
                  | select(.spec.approved == false)
                  | select(.spec.clusterServiceVersionNames[]
                      | contains("rhcl-operator"))
                  | .metadata.name
                ' 2>/dev/null | head -1 || true)
            if [ -n "$PLAN" ]; then
              echo "Found pending plan: $PLAN - approving..."
              oc patch installplan "$PLAN" -n openshift-operators \
                --type=merge -p '{"spec":{"approved":true}}'
              echo "Approved successfully."
              exit 0
            fi
            # Re-check state in case it became AtLatestKnown during retry loop
            STATE=$(oc get subscription rhcl-operator -n openshift-operators \
              -o jsonpath='{.status.state}' 2>/dev/null || true)
            if [ "$STATE" = "AtLatestKnown" ]; then
              echo "rhcl-operator reached AtLatestKnown - install plan was approved externally."
              exit 0
            fi
            echo "Attempt $i/60: no pending plan yet, retrying in 10s..."
            sleep 10
          done
          echo "WARNING: timed out waiting for rhcl-operator install plan."
          exit 1

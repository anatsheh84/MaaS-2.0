apiVersion: v2
name: rhcl-installplan-approver
description: >
  Automatically approves the OLM install plan for rhcl-operator (Kuadrant).
  On RHPDS clusters, OpenShift pre-installs servicemeshoperator3 with
  installPlanApproval: Manual (marked ingress.operator.openshift.io/owned).
  When OLM resolves rhcl-operator's dependency on servicemeshoperator3 it
  bundles both into one install plan. Because one subscription is Manual,
  the combined plan requires manual approval, blocking Kuadrant CRD
  installation. This chart runs a Job that watches for the pending plan and
  approves it automatically.
type: application
version: 0.1.0

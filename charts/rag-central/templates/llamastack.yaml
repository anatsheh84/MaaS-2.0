---
# LlamaStack — stateless deployment using the RHOAI built-in parameterized config.
# All backends (Postgres, Milvus, S3) are configured via environment variables.
# No custom ConfigMap needed — the RHOAI image has a built-in config at
# /opt/app-root/config.yaml that reads all settings from env vars.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack
    app.kubernetes.io/part-of: rag-central
spec:
  replicas: {{ .Values.llamastack.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: llamastack
  template:
    metadata:
      labels:
        app: llamastack
    spec:
      # ── Init container: patch vLLM provider to register nomic-embed as embedding ──
      # LlamaStack auto-discovers models from vLLM and registers nomic-embed as
      # type=llm. This patch injects embedding_model_metadata so OpenAIMixin.list_models()
      # correctly identifies it as an embedding model on every startup.
      # Upstream fix: LlamaStack PR #4975, not yet in RHOAI image.
      initContainers:
      # ── Init 1: wait for Postgres to accept authenticated connections ──
      - name: wait-for-postgres
        image: {{ .Values.postgres.image }}
        command: [bash, -c]
        args:
        - |
          echo "Waiting for Postgres to accept connections..."
          for i in $(seq 1 30); do
            if PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" \
               -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
               -c 'SELECT 1' >/dev/null 2>&1; then
              echo "Postgres ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 2s..."
            sleep 2
          done
          echo "ERROR: Postgres not reachable after 60s"
          exit 1
        env:
        - name: POSTGRES_HOST
          value: llamastack-postgres.{{ .Values.namespace }}.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database }}
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-password
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      # ── Init 2: patch vLLM provider to register nomic-embed as embedding ──
      - name: patch-vllm-provider
        image: {{ .Values.llamastack.image }}
        command: [sh, -c]
        args:
        - |
          VLLM_DIR=/opt/app-root/lib64/python3.12/site-packages/llama_stack/providers/remote/inference/vllm
          cp -a "$VLLM_DIR"/* /patched-vllm/
          sed -i '/provider_data_api_key_field.*vllm_api_token/a\
          \n    # Patched: register nomic-embed as embedding model (upstream fix PR #4975)\
              embedding_model_metadata: dict[str, dict[str, int]] = {\
                  "nomic-embed": {"embedding_dimension": 768},\
              }' /patched-vllm/vllm.py
          if grep -q 'nomic-embed' /patched-vllm/vllm.py; then
            echo "Patch applied — nomic-embed will register as embedding"
          else
            echo "ERROR: patch failed" && exit 1
          fi
        volumeMounts:
        - name: patched-vllm-provider
          mountPath: /patched-vllm
      containers:
      - name: llamastack
        image: {{ .Values.llamastack.image }}
        env:
        # ── PostgreSQL storage backends ──
        - name: POSTGRES_HOST
          value: llamastack-postgres.{{ .Values.namespace }}.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: llamastack
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-password
        # ── Inference via direct internal KServe service (bypasses MaaS gateway) ──
        # vLLM on RHOAI 3.4 serves HTTPS on port 8000; no auth needed internally.
        - name: VLLM_URL
          value: https://llama-3-1-8b-instruct-fp8-kserve-workload-svc.llm.svc.cluster.local:8000/v1
        - name: VLLM_API_TOKEN
          value: fake
        - name: VLLM_TLS_VERIFY
          value: "false"
        - name: VLLM_MAX_TOKENS
          value: "8192"
        # ── Embedding model (plain HTTP — embed-model is a Deployment, not KServe) ──
        - name: VLLM_EMBEDDING_URL
          value: http://nomic-embed.llm.svc.cluster.local:8000/v1
        - name: VLLM_EMBEDDING_API_TOKEN
          value: fake
        - name: VLLM_EMBEDDING_TLS_VERIFY
          value: "false"
        # ── Remote Milvus ──
        - name: MILVUS_ENDPOINT
          value: http://milvus.{{ .Values.namespace }}.svc.cluster.local:19530
        - name: MILVUS_TOKEN
          value: ""
        - name: MILVUS_CONSISTENCY_LEVEL
          value: Strong
        # ── S3 files storage ──
        - name: ENABLE_S3
          value: "true"
        - name: S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: llamastack-s3
              key: bucket-name
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: llamastack-s3
              key: region
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: llamastack-s3
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: llamastack-s3
              key: aws-secret-access-key
        # ── Runtime config ──
        - name: LLAMA_STACK_CONFIG_DIR
          value: /tmp/llama-runtime
        ports:
        - containerPort: 8321
          name: http
        startupProbe:
          httpGet:
            path: /v1/health
            port: 8321
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8321
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8321
          periodSeconds: 10
        resources:
          {{- toYaml .Values.llamastack.resources | nindent 10 }}
        volumeMounts:
        - name: runtime
          mountPath: /tmp/llama-runtime
        - name: llama-home
          mountPath: /opt/app-root/src/.llama
        - name: patched-vllm-provider
          mountPath: /opt/app-root/lib64/python3.12/site-packages/llama_stack/providers/remote/inference/vllm
      volumes:
      - name: runtime
        emptyDir: {}
      - name: llama-home
        emptyDir: {}
      - name: patched-vllm-provider
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack
    app.kubernetes.io/part-of: rag-central
spec:
  selector:
    app: llamastack
  ports:
  - port: 8321
    targetPort: 8321
    name: http

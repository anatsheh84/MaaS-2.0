{{- $existingSecret := (lookup "v1" "Secret" .Values.namespace "llamastack-postgres") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
type: Opaque
{{- if $existingSecret }}
data:
  database-user: {{ index $existingSecret.data "database-user" }}
  database-password: {{ index $existingSecret.data "database-password" }}
  database-name: {{ index $existingSecret.data "database-name" }}
{{- else }}
stringData:
  database-user: llamastack
  database-password: {{ randAlphaNum 24 | quote }}
  database-name: llamastack
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
  storageClassName: {{ .Values.postgres.storageClass }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: llamastack-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: llamastack-postgres
    spec:
      containers:
      - name: postgresql
        image: {{ .Values.postgres.image }}
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-user
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-password
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-name
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          protocol: TCP
        livenessProbe:
          exec:
            command: [bash, -c, /usr/bin/pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: [bash, -c, "psql -w -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE -c 'SELECT 1'"]
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: llamastack-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
spec:
  selector:
    app: llamastack-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql

---
# Postgres secret — uses static values from values.yaml.
# IMPORTANT: Do NOT use randAlphaNum or lookup here.  ArgoCD renders
# manifests with `helm template` (offline), where lookup always returns
# nil.  Combined with randAlphaNum this causes a new random password on
# every sync cycle, drifting from the password stored in Postgres on
# the PVC — the #1 cause of "password authentication failed" crashes.
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
type: Opaque
stringData:
  database-user: {{ .Values.postgres.user }}
  database-password: {{ .Values.postgres.password }}
  database-name: {{ .Values.postgres.database }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
  storageClassName: {{ .Values.postgres.storageClass }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: llamastack-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: llamastack-postgres
      annotations:
        # Force pod restart when the secret content changes (e.g. password
        # updated in values.yaml).  Without this, the Postgres pod keeps
        # running with the old password while new client pods read the new
        # secret, causing "password authentication failed".
        checksum/postgres-secret: {{ include (print $.Template.BasePath "/postgres.yaml") . | sha256sum }}
    spec:
      containers:
      - name: postgresql
        image: {{ .Values.postgres.image }}
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-user
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-password
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres
              key: database-name
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          protocol: TCP
        livenessProbe:
          exec:
            command: [bash, -c, /usr/bin/pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: [bash, -c, "psql -w -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE -c 'SELECT 1'"]
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: llamastack-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-central
spec:
  selector:
    app: llamastack-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql

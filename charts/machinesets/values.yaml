# Override these from the bootstrap Application helm values block
infrID: ""
ami: ""
region: us-east-2
guid: ""
uuid: ""

# Worker MachineSets
# Cluster only has subnets in us-east-2c; all 5 workers go there
workers:
  - az: us-east-2c
    replicas: 5

# GPU MachineSet — g6e.2xlarge (NVIDIA L40S)
gpu:
  az: us-east-2c
  replicas: 1
  instanceType: g6e.2xlarge
  volumeSize: 250

# Override these from the bootstrap Application helm values block
infraID: ""
ami: ""
region: us-east-2
guid: ""
uuid: ""

# Worker MachineSets
# az is injected by the bootstrap Application from aws.az (auto-detected by configure.sh).
# Do NOT hardcode an AZ here — it varies per RHPDS cluster.
workers:
  - az: ""
    replicas: 5

# GPU MachineSet — g6e.2xlarge with NVIDIA L40S (46GB VRAM)
# Taint: nvidia.com/gpu=l40-gpu:NoSchedule
gpu:
  az: ""
  replicas: 1
  instanceType: g6e.2xlarge
  volumeSize: 250

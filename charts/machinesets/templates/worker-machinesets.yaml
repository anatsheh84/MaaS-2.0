{{- range .Values.workers }}
---
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: {{ $.Values.infraID }}-worker-{{ .az }}
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
  annotations:
    capacity.cluster-autoscaler.kubernetes.io/labels: kubernetes.io/arch=amd64
    machine.openshift.io/GPU: "0"
    machine.openshift.io/memoryMb: "65536"
    machine.openshift.io/vCPU: "16"
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
      machine.openshift.io/cluster-api-machineset: {{ $.Values.infraID }}-worker-{{ .az }}
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: {{ $.Values.infraID }}-worker-{{ .az }}
    spec:
      lifecycleHooks: {}
      metadata: {}
      providerSpec:
        value:
          ami:
            id: {{ $.Values.ami }}
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
          - ebs:
              encrypted: true
              iops: 0
              kmsKey:
                arn: ""
              volumeSize: 100
              volumeType: gp2
          capacityReservationId: ""
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: {{ $.Values.infraID }}-worker-profile
          instanceType: m6a.4xlarge
          kind: AWSMachineProviderConfig
          metadata:
            creationTimestamp: null
          metadataServiceOptions: {}
          placement:
            availabilityZone: {{ .az }}
            region: {{ $.Values.region }}
          securityGroups:
          - filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-node
          - filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-lb
          subnet:
            filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-subnet-private-{{ .az }}
          tags:
          - name: kubernetes.io/cluster/{{ $.Values.infraID }}
            value: owned
          - name: env_type
            value: ocp4-cluster
          - name: guid
            value: {{ $.Values.guid }}
          - name: owner
            value: unknown
          - name: platform
            value: RHPDS
          - name: uuid
            value: "{{ $.Values.uuid }}"
          userDataSecret:
            name: worker-user-data
{{- end }}

{{- range .Values.gpuSets }}
---
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: {{ $.Values.infraID }}-worker-gpu-{{ .instanceType | replace "." "-" }}-{{ .az }}
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
  annotations:
    capacity.cluster-autoscaler.kubernetes.io/labels: kubernetes.io/arch=amd64
    # GPU/memoryMb/vCPU annotations are ignored by ArgoCD (see Application
    # ignoreDifferences) — the machine-api operator owns their values.
    machine.openshift.io/vCPU: "{{ .vCPU }}"
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
      machine.openshift.io/cluster-api-machine-role: worker-gpu
      machine.openshift.io/cluster-api-machine-type: worker-gpu
      machine.openshift.io/cluster-api-machineset: {{ $.Values.infraID }}-worker-gpu-{{ .instanceType | replace "." "-" }}-{{ .az }}
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: {{ $.Values.infraID }}
        machine.openshift.io/cluster-api-machine-role: worker-gpu
        machine.openshift.io/cluster-api-machine-type: worker-gpu
        machine.openshift.io/cluster-api-machineset: {{ $.Values.infraID }}-worker-gpu-{{ .instanceType | replace "." "-" }}-{{ .az }}
    spec:
      lifecycleHooks: {}
      metadata:
        labels:
          node-role.kubernetes.io/worker-gpu: ""
      providerSpec:
        value:
          ami:
            id: {{ $.Values.ami }}
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
          - ebs:
              iops: 0
              kmsKey: {}
              volumeSize: {{ .volumeSize }}
              volumeType: gp3
          capacityReservationId: ""
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: {{ $.Values.infraID }}-worker-profile
          instanceType: {{ .instanceType }}
          kind: AWSMachineProviderConfig
          metadata:
            creationTimestamp: null
          metadataServiceOptions: {}
          placement:
            availabilityZone: {{ .az }}
            region: {{ $.Values.region }}
          securityGroups:
          - filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-node
          - filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-lb
          subnet:
            filters:
            - name: tag:Name
              values:
              - {{ $.Values.infraID }}-subnet-private-{{ .az }}
          tags:
          - name: kubernetes.io/cluster/{{ $.Values.infraID }}
            value: owned
          - name: env_type
            value: ocp4-cluster
          - name: guid
            value: {{ $.Values.guid }}
          - name: owner
            value: unknown
          - name: platform
            value: RHPDS
          - name: uuid
            value: "{{ $.Values.uuid }}"
          userDataSecret:
            name: worker-user-data
      taints:
      - effect: NoSchedule
        key: nvidia.com/gpu
        value: l40-gpu
{{- end }}

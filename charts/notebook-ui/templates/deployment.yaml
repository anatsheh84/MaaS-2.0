apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-ui
    app.kubernetes.io/name: notebook-ui
    app.kubernetes.io/part-of: notebook-ui
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: notebook-ui
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: notebook-ui
        app.kubernetes.io/name: notebook-ui
        app.kubernetes.io/part-of: notebook-ui
    spec:
      serviceAccountName: notebook-ui
      containers:
      # ── oauth-proxy sidecar ──────────────────────────────────────────────
      # Sits in front of nginx. All external traffic enters here on port 4180.
      # Validates the OpenShift session cookie, redirects to OpenShift OAuth
      # if unauthenticated, then proxies to nginx on 8080 with X-Forwarded-User.
      - name: oauth-proxy
        image: image-registry.openshift-image-registry.svc:5000/openshift/oauth-proxy:v4.4
        imagePullPolicy: IfNotPresent
        ports:
        - name: oauth
          containerPort: 4180
          protocol: TCP
        args:
        - --provider=openshift
        - --https-address=
        - --http-address=:4180
        - --upstream=http://localhost:8080
        - --openshift-service-account=notebook-ui
        - --cookie-secret-file=/etc/proxy/secrets/session_secret
        - --cookie-secure=true
        - --cookie-httponly=true
        - --pass-user-headers=true
        - --skip-auth-regex=^/healthz
        - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        - --email-domain=*
        volumeMounts:
        - name: proxy-secret
          mountPath: /etc/proxy/secrets
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

      # ── nginx container ──────────────────────────────────────────────────
      # Only reachable from oauth-proxy (localhost:8080). Not exposed externally.
      - name: notebook-ui
        image: {{ .Values.image }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: nginx-config
          mountPath: /opt/app-root/etc/nginx.default.d/
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      volumes:
      - name: nginx-config
        configMap:
          name: notebook-ui-nginx
      - name: proxy-secret
        secret:
          secretName: notebook-ui-proxy

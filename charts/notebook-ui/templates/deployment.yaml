apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-ui
    app.kubernetes.io/name: notebook-ui
    app.kubernetes.io/part-of: notebook-ui
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: notebook-ui
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: notebook-ui
        app.kubernetes.io/name: notebook-ui
        app.kubernetes.io/part-of: notebook-ui
    spec:
      containers:
      - name: notebook-ui
        image: {{ .Values.image }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: nginx-config
          mountPath: /opt/app-root/etc/nginx.default.d/
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      volumes:
      - name: nginx-config
        configMap:
          name: notebook-ui-nginx

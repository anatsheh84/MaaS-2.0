apiVersion: v1
kind: ConfigMap
metadata:
  name: notebook-ui-nginx
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-ui
    app.kubernetes.io/part-of: notebook-ui
    app.kubernetes.io/managed-by: Helm
data:
  api-proxy.conf: |
    client_max_body_size 50m;

    location /api/ {
        proxy_pass {{ .Values.notebookApiUrl }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security: strip any incoming X-Forwarded-User from the browser
        # so it cannot be spoofed. oauth-proxy sets the real value internally.
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

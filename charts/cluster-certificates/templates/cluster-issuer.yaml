---
# Let's Encrypt production ClusterIssuer using Route53 DNS-01 challenge.
# The AWS secret key is read from the 'cert-manager-aws-creds' Secret
# (must be created manually — see Chart.yaml for the oc create secret command).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuerName }}
spec:
  acme:
    email: {{ .Values.email }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: cluster-issuer-acme-production
    solvers:
      - dns01:
          route53:
            accessKeyID: {{ .Values.route53.accessKeyID }}
            hostedZoneID: {{ .Values.route53.hostedZoneID }}
            region: {{ .Values.route53.region }}
            secretAccessKeySecretRef:
              name: {{ .Values.route53.credentialsSecretName }}
              key: aws_secret_access_key
        selector:
          dnsZones:
            {{- range .Values.dnsZones }}
            - {{ . }}
            {{- end }}

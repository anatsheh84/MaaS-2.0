---
# Wildcard TLS certificate for all *.apps.<domain> routes.
# Used as the default cert for the IngressController (see ingress-controller.yaml).
# Also referenced by the maas-default-gateway as 'cert-manager-ingress-cert'.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-ingress-cert
  namespace: openshift-ingress
spec:
  # .Values.domain IS already the apps subdomain (e.g. apps.cluster-xxx...)
  # DO NOT prefix with 'apps.' — that would create apps.apps.cluster-xxx...
  commonName: {{ .Values.domain }}
  dnsNames:
    - {{ .Values.domain }}
    - "*.{{ .Values.domain }}"
  duration: 2160h   # 90 days
  renewBefore: 360h # renew 15 days before expiry
  isCA: false
  usages:
    - server auth
    - client auth
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .Values.issuerName }}
  secretName: cert-manager-ingress-cert
---
# Certificate for the API server endpoint.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-api-cert
  namespace: openshift-config
spec:
  # apiDomain is the full API hostname: api.cluster-xxx...
  commonName: {{ .Values.apiDomain }}
  dnsNames:
    - {{ .Values.apiDomain }}
  duration: 2160h
  renewBefore: 360h
  isCA: false
  usages:
    - server auth
    - client auth
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .Values.issuerName }}
  secretName: cert-manager-api-cert

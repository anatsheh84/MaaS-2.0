# Dedicated ServiceAccount for notebook-api
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notebook-api
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
---
# Role in the llm namespace — read-only access to LLMInferenceServices
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notebook-api-model-reader
  namespace: llm
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["llminferenceservices"]
  verbs: ["get", "list"]
---
# RoleBinding for model discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notebook-api-model-reader
  namespace: llm
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notebook-api-model-reader
subjects:
- kind: ServiceAccount
  name: notebook-api
  namespace: {{ .Values.namespace }}
{{- range .Values.tierNamespaces }}
---
# Role in {{ . }} — list SAs and create tokens for per-user MaaS gateway access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notebook-api-token-requester
  namespace: {{ . }}
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
rules:
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notebook-api-token-requester
  namespace: {{ . }}
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notebook-api-token-requester
subjects:
- kind: ServiceAccount
  name: notebook-api
  namespace: {{ $.Values.namespace }}
{{- end }}

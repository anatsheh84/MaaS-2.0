apiVersion: v1
kind: ConfigMap
metadata:
  name: notebook-api
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
data:
  LLAMASTACK_URL: {{ .Values.llamastackUrl | quote }}
  LLAMASTACK_EMBEDDING_MODEL: {{ .Values.llamastackEmbeddingModel | quote }}
  MAAS_BASE_URL: {{ .Values.maasBaseUrl | quote }}
  TOP_K_RESULTS: {{ .Values.topKResults | quote }}
  CHUNK_SIZE: {{ .Values.chunkSize | quote }}

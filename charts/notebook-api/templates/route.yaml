{{- if .Values.deployer.domain }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notebook-api
  namespace: {{ .Values.namespace }}
  labels:
    app: notebook-api
    app.kubernetes.io/part-of: notebook-api
    app.kubernetes.io/managed-by: Helm
spec:
  host: notebook-api.{{ .Values.deployer.domain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: notebook-api
    weight: 100
{{- end }}

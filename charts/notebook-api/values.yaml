# NotebookLM RAG API
# ──────────────────
# Override in values-llmaas.yaml for cluster deployment.

namespace: maas-rag

image: image-registry.openshift-image-registry.svc:5000/maas-rag/notebook-api:latest
replicas: 1

# Upstream service URLs — defaults assume all services in maas-rag namespace
maasBaseUrl: "https://maas.apps.cluster.local"
milvusUri: "http://milvus.maas-rag.svc:19530"
embedEndpoint: "http://nomic-embed-predictor.maas-rag.svc/v1"
embedModel: "sentence-transformers/nomic-ai/nomic-embed-text-v1.5"
doclingUrl: ""

# RAG tuning
maxChunkSize: 512
chunkOverlap: 50
topKResults: 5
scoreThreshold: "0.75"

# Route
deployer:
  domain: ""

resources:
  requests:
    cpu: "4"
    memory: 10Gi
  limits:
    cpu: "4"
    memory: 10Gi

# NotebookLM RAG API
# ──────────────────
# Override in values-llmaas.yaml for cluster deployment.

namespace: maas-rag

image: quay.io/maas/notebook-api:latest
replicas: 1

# Upstream service URLs — defaults assume all services in maas-rag namespace
llamastackUrl: "http://llamastack:8321"
milvusUri: "http://milvus.maas-rag.svc:19530"
embedEndpoint: "http://nomic-embed-predictor.maas-rag.svc/v1"
embedModel: "nomic-embed-text-v1.5"
doclingUrl: ""

# RAG tuning
maxChunkSize: 512
chunkOverlap: 50
topKResults: 5
scoreThreshold: "0.75"

# Route
deployer:
  domain: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

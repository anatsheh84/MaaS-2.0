# NotebookLM RAG API — LlamaStack-native architecture
namespace: maas-rag

image: image-registry.openshift-image-registry.svc:5000/maas-rag/notebook-api:latest
replicas: 1

llamastackUrl: "http://llamastack:8321"
llamastackEmbeddingModel: "sentence-transformers/snowflake-embed"
maasBaseUrl: "https://maas.apps.cluster.local"
topKResults: "5"
chunkSize: "512"

deployer:
  domain: ""

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

# Tier namespaces where per-user MaaS SA tokens are provisioned by maas-api
# notebook-api will look up the authenticated user's SA in these namespaces
tierNamespaces:
  - maas-default-gateway-tier-free
  - maas-default-gateway-tier-premium

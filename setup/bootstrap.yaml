# Bootstrap Application — apply this manually to kick off GitOps
# Usage: oc apply -f setup/bootstrap.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: openshift-gitops
spec:
  destination:
    name: in-cluster
    namespace: openshift-gitops
  project: default
  source:
    path: bootstrap
    repoURL: https://github.com/anatsheh84/MaaS-2.0
    targetRevision: rhoai-3.4
    helm:
      valueFiles:
        - values.yaml
  ignoreDifferences:
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 10m

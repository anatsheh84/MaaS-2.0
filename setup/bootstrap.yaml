# Bootstrap Application — apply this manually to kick off GitOps
# Usage: oc apply -f setup/bootstrap.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: openshift-gitops
spec:
  destination:
    name: in-cluster
    namespace: openshift-gitops
  project: default
  source:
    path: bootstrap
    repoURL: https://github.com/anatsheh84/MaaS-2.0
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  ignoreDifferences:
    # ArgoCD operator adds defaults to /spec on every reconcile — ignore the
    # entire spec to avoid constant drift from operator-managed fields.
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /spec
    # kubectl.kubernetes.io/last-applied-configuration is injected by the
    # initial 'oc apply -f setup/bootstrap.yaml' on fresh clusters. ArgoCD
    # subsequently manages these resources via server-side apply and does not
    # set this annotation — causing permanent OutOfSync on the Namespace and
    # ArgoCD CR. Ignoring it on both resource types.
    - kind: Namespace
      jsonPointers:
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
    # The OpenShift GitOps operator owns the ArgoCD CR and clears all
    # annotations on every reconcile — including ArgoCD's own tracking-id.
    # Ignoring the entire annotations block prevents permanent OutOfSync.
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /metadata/annotations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 3
        maxDuration: 10m

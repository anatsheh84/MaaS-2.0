# ArgoCD instance configuration
# bootstrap/templates/extra-resources/gitops.yaml
#
# IMPORTANT: setup/bootstrap.yaml has ignoreDifferences on ArgoCD /spec so that
# operator-added defaults (grafana, prometheus, redis, etc.) don't cause constant
# drift. However ArgoCD WILL apply this spec on every sync triggered by a git
# change, so any field set here takes effect.
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-gitops
  annotations:
    openshift.io/cluster-monitoring: 'true'
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  resourceTrackingMethod: annotation
  # Custom health checks for OLM Subscriptions.
  # ArgoCD's default Subscription health check marks any resource with a
  # ResolutionFailed condition as Degraded — even when the subscription is
  # fully installed (state: AtLatestKnown). On RHPDS clusters, the OpenShift-
  # managed servicemeshoperator3 subscription has a stale version-pinning
  # conflict that propagates ResolutionFailed to all dependent subscriptions
  # (grafana, devspaces, rhcl-operator). This causes wave 0 to fail and blocks
  # wave 1+ resources from ever being applied.
  # Fix: treat AtLatestKnown as Healthy unconditionally.
  resourceCustomizations: |
    operators.coreos.com/Subscription:
      health.lua: |
        health_status = {}
        if obj.status ~= nil then
          if obj.status.state == "AtLatestKnown" then
            health_status.status = "Healthy"
            health_status.message = obj.status.currentCSV or ""
            return health_status
          end
          if obj.status.state == "UpgradePending" then
            health_status.status = "Progressing"
            health_status.message = "Waiting for CSV " .. (obj.status.currentCSV or "unknown")
            return health_status
          end
          for _, condition in ipairs(obj.status.conditions or {}) do
            if condition.type == "InstallPlanPending" and condition.status == "True" then
              health_status.status = "Progressing"
              health_status.message = "Install plan pending approval"
              return health_status
            end
            if condition.type == "ResolutionFailed" and condition.status == "True" then
              health_status.status = "Degraded"
              health_status.message = condition.message
              return health_status
            end
          end
        end
        health_status.status = "Progressing"
        health_status.message = "Waiting for subscription state"
        return health_status
  server:
    # insecure: true — ArgoCD server runs HTTP internally; TLS is terminated
    # at the OpenShift Route (edge termination). Required when route.tls is set.
    insecure: true
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    route:
      # This is the field the GitOps operator checks to create the Route.
      # Without enabled: true the route is never created and the UI is inaccessible.
      enabled: true
      tls:
        insecureEdgeTerminationPolicy: Redirect
        termination: edge
    service:
      type: ""

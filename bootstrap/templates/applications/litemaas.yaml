apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litemaas
  namespace: openshift-gitops
  annotations:
    # Wave 8 — after RHOAI, MaaS API, networking and models are all healthy.
    # LiteMaaS is a consumer of the platform, not a dependency of anything else.
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/litemaas
    helm:
      valuesObject:
        namespace: {{ .Values.litemaas.namespace }}

        deployer:
          domain: {{ .Values.deployer.domain }}

        images:
          backend:
            repository: quay.io/rh-aiservices-bu/litemaas-backend
            tag: {{ .Values.litemaas.version | quote }}
          frontend:
            repository: quay.io/rh-aiservices-bu/litemaas-frontend
            tag: {{ .Values.litemaas.version | quote }}

        # Pre-created secret — generated by configure.sh, never stored in git
        existingSecret: {{ .Values.litemaas.existingSecret }}

        oauth:
          clientId: {{ .Values.litemaas.oauthClientId }}

        nodeTlsRejectUnauthorized: {{ .Values.litemaas.nodeTlsRejectUnauthorized | quote }}

        rbac:
          adminGroup: litemaas-admins
          readonlyGroup: litemaas-readonly
          usersGroup: litemaas-users
          adminUsers:
            {{- range .Values.litemaas.adminUsers }}
            - {{ . }}
            {{- end }}
  destination:
    name: in-cluster
    namespace: {{ .Values.litemaas.namespace }}
  # Kubernetes auto-injects apiVersion and kind into volumeClaimTemplates
  # entries on StatefulSet admission. These fields are absent from the chart
  # template and cannot be patched back (VCTs are immutable on live StatefulSets),
  # causing a permanent OutOfSync loop. Ignoring them here.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: postgres
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # Note: OAuthClient is NOT managed by ArgoCD — OpenShift identity/auth
  # cluster-scoped resources cause structured merge diff errors in ArgoCD.
  # OAuthClient is created by configure.sh on fresh deployments.

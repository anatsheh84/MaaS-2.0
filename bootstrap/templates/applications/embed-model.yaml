apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: embed-model
  namespace: openshift-gitops
  annotations:
    # Wave 6 — alongside other models, after OpenShift AI operand
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/embed-model
  destination:
    name: in-cluster
    namespace: llm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

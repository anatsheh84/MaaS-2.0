apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: models
  namespace: openshift-gitops
  annotations:
    # Wave 6 — after OpenShift AI operand (wave 5) is healthy
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/models
  destination:
    name: in-cluster
    namespace: llm
  ignoreDifferences:
    - group: serving.kserve.io
      kind: LLMInferenceService
      jsonPointers:
        - /metadata/annotations/serving.kserve.io~1stop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true

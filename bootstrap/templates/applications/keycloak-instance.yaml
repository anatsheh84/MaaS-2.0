{{- if .Values.keycloak.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-instance
  namespace: openshift-gitops
  annotations:
    # Wave 3 — after keycloak operator (wave 2) is healthy
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/keycloak-instance
    helm:
      values: |
        domain: {{ .Values.cluster.domain }}
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # OAuth cluster resource is shared — only manage identityProviders field
    - group: config.openshift.io
      kind: OAuth
      name: cluster
      jqPathExpressions:
        - .spec.tokenConfig
        - .spec.templates
{{- end }}

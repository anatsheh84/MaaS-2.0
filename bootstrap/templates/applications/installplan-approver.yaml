apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: installplan-approver
  namespace: openshift-gitops
  annotations:
    # Wave 4 — same wave as rhcl-operator, rhcl-operator, and grafana so the
    # approver Job is running the moment OLM creates any pending InstallPlan.
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/installplan-approver
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

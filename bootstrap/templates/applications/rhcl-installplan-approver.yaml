apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhcl-installplan-approver
  namespace: openshift-gitops
  annotations:
    # Wave 4 — same wave as rhcl-operator so the approver Job is ready
    # the moment OLM creates the combined install plan.
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/rhcl-installplan-approver
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

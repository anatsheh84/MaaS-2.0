apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notebook-ui
  namespace: openshift-gitops
  annotations:
    # Wave 9 — alongside notebook-api.
    # NotebookLM RAG frontend — connects to notebook-api.
    argocd.argoproj.io/sync-wave: "9"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/notebook-ui
    helm:
      valueFiles:
        - values.yaml
        - values-llmaas.yaml
  destination:
    name: in-cluster
    namespace: maas-rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: machinesets
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/machinesets
    helm:
      values: |
        infraID: {{ .Values.cluster.infraID }}
        ami: {{ .Values.aws.ami }}
        region: {{ .Values.cluster.region }}
        guid: {{ .Values.aws.guid }}
        uuid: "{{ .Values.aws.uuid }}"
        workers:
          - az: {{ .Values.aws.az }}
            replicas: 5
        gpuSets:
          - instanceType: g6e.2xlarge
            az: {{ .Values.aws.az }}
            replicas: 1
            vCPU: "8"
            volumeSize: 250
          - instanceType: g6e.12xlarge
            az: {{ .Values.aws.az }}
            replicas: 0
            vCPU: "48"
            volumeSize: 500
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-machine-api
  # ignoreDifferences on spec.replicas for all MachineSets so that scaling
  # via the OpenShift GUI or 'oc scale' is not reverted by ArgoCD selfHeal.
  # ArgoCD still owns the MachineSet definition (instance type, AZ, tags,
  # taints, etc.) — only the replica count is left to the user/autoscaler.
  ignoreDifferences:
    - group: machine.openshift.io
      kind: MachineSet
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

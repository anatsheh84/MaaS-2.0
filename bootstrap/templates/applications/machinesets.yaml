apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: machinesets
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/machinesets
    helm:
      values: |
        infraID: {{ .Values.cluster.infraID }}
        ami: {{ .Values.aws.ami }}
        region: {{ .Values.cluster.region }}
        guid: {{ .Values.aws.guid }}
        uuid: "{{ .Values.aws.uuid }}"
        workers:
          - az: {{ .Values.aws.az }}
            replicas: 3
        gpuSets:
          - instanceType: g6e.2xlarge
            az: {{ .Values.aws.az }}
            replicas: 0
            vCPU: "8"
            volumeSize: 250
          - instanceType: g6e.12xlarge
            az: {{ .Values.aws.az }}
            replicas: 1
            vCPU: "48"
            volumeSize: 500
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-machine-api
  # ignoreDifferences keeps ArgoCD from fighting over fields it should not own:
  #   /spec/replicas          — scaling is managed by the user or cluster autoscaler
  #                             after initial provisioning. These replica counts only
  #                             apply on first sync of a fresh cluster.
  #   machine.openshift.io/GPU, memoryMb, vCPU annotations — capacity hints set by
  #                             the machine-api operator; vary per cluster/instance
  #                             type and have no effect on provisioning correctness.
  ignoreDifferences:
    - group: machine.openshift.io
      kind: MachineSet
      jsonPointers:
        - /spec/replicas
        - /metadata/annotations/machine.openshift.io~1GPU
        - /metadata/annotations/machine.openshift.io~1memoryMb
        - /metadata/annotations/machine.openshift.io~1vCPU
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

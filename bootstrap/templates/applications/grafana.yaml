apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.llmaas.repoURL }}
    targetRevision: {{ .Values.llmaas.targetRevision }}
    path: deployments/grafana
  destination:
    name: in-cluster
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
  ignoreDifferences:
    - kind: Secret
      name: grafana-proxy
      jsonPointers:
        - /data/session_secret
    # grafana-all-login gives view to system:authenticated:oauth (everyone),
    # which pollutes the RHOAI project picker for regular users.
    # We patch it to tier-premium-users only — ignore drift so ArgoCD
    # doesn't revert back to system:authenticated:oauth.
    - kind: RoleBinding
      name: grafana-all-login
      jsonPointers:
        - /subjects

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-registry
  namespace: openshift-gitops
  annotations:
    # Wave 6 — after openshift-ai (wave 5) has deployed the ModelRegistry operator component
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/model-registry
    helm:
      valueFiles:
        - values.yaml
        - values-llmaas.yaml
  destination:
    name: in-cluster
    namespace: rhoai-model-registries
  # The ModelRegistry operator mutates the CR after creation — it strips fields
  # it does not recognise (skipDBCreation, sslMode) and injects its own image/
  # resource defaults. ServerSideApply prevents last-applied-configuration drift.
  # RespectIgnoreDifferences ensures ignored fields are not touched during sync.
  ignoreDifferences:
    - group: modelregistry.opendatahub.io
      kind: ModelRegistry
      jsonPointers:
        - /spec/rest/image
        - /spec/rest/resources
        - /spec/grpc/image
        - /spec/postgres/image
        - /spec/postgres/skipDBCreation
        - /spec/postgres/sslMode
        - /status
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-registry
  namespace: openshift-gitops
  annotations:
    # Wave 6 — after openshift-ai (wave 5) has deployed the ModelRegistry operator component
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: charts/model-registry
    helm:
      valueFiles:
        - values.yaml
        - values-llmaas.yaml
  destination:
    name: in-cluster
    namespace: rhoai-model-registries
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # The ModelRegistry operator injects specDefaults into the spec after creation.
  # This is operator-managed metadata — ignore it to prevent a permanent OutOfSync loop.
  ignoreDifferences:
    - group: modelregistry.opendatahub.io
      kind: ModelRegistry
      jsonPointers:
        - /spec/rest/image
        - /spec/rest/resources
        - /spec/grpc/image
        - /spec/postgres/image
        - /status

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: models-as-a-service
  namespace: openshift-gitops
  annotations:
    # Wave 6 — alongside models, both need RHOAI
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/opendatahub-io/models-as-a-service.git
    targetRevision: 39e62e98f382621e401211ae21cb9de0601b8266
    path: deployment/overlays/openshift
    kustomize:
      patches:
        - target:
            kind: Gateway
            name: maas-default-gateway
          patch: |-
            - op: replace
              path: /spec/listeners/0/hostname
              value: maas.{{ .Values.deployer.domain }}
            - op: replace
              path: /spec/listeners/1/hostname
              value: maas.{{ .Values.deployer.domain }}
            - op: replace
              path: /spec/listeners/1/tls/certificateRefs/0/name
              value: cert-manager-ingress-cert
        - target:
            kind: Deployment
            name: maas-api
          patch: |-
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: quay.io/opendatahub/maas-api:latest-0681979
  destination:
    name: in-cluster
    namespace: maas-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

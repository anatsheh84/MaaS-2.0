# MaaS 2.0 Bootstrap Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is committed to git as a TEMPLATE.
# Cluster-specific fields are intentionally empty ("").
#
# DO NOT edit this file manually for a new cluster.
# Run setup/configure.sh instead — it populates values.local.yaml and
# patches the ArgoCD bootstrap Application directly. No git commit required.
# ─────────────────────────────────────────────────────────────────────────────

bootstrap:
  repoURL: https://github.com/anatsheh84/MaaS-2.0
  targetRevision: main

# ── Cluster-specific (populated by configure.sh, never committed) ─────────────
cluster:
  infraID: ""
  apiUrl: ""
  apiDomain: ""
  domain: ""
  region: us-east-2     # RHPDS always deploys to us-east-2
  platform: AWS

aws:
  ami: ""
  guid: ""
  uuid: ""
  az: us-east-2c        # RHPDS single-AZ — only us-east-2c has subnets

deployer:
  domain: ""            # same as cluster.domain

certManager:
  issuerName: letsencrypt-production-ec2
  email: rhpds-admins@redhat.com
  route53:
    accessKeyID: ""     # populated by configure.sh, never committed
    hostedZoneID: ""    # populated by configure.sh, never committed
    region: us-east-2
    credentialsSecretName: cert-manager-aws-creds
  dnsZones: []          # populated by configure.sh

# ── Fixed across all deployments ──────────────────────────────────────────────
llmaas:
  repoURL: https://github.com/rhpds/private-llmaas-multitenant
  targetRevision: v1.2.0

users:
  count: 2
  prefix: user

slack:
  botToken: "REPLACE_ME_DO_NOT_COMMIT"

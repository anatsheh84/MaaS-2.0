# MaaS 2.0 Bootstrap Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is committed to git as a TEMPLATE.
# Cluster-specific fields are intentionally empty ("").
#
# DO NOT edit this file manually for a new cluster.
# Run setup/configure.sh instead — it populates values.local.yaml and
# patches the ArgoCD bootstrap Application directly. No git commit required.
# ─────────────────────────────────────────────────────────────────────────────

bootstrap:
  repoURL: https://github.com/anatsheh84/MaaS-2.0
  targetRevision: main

# ── Cluster-specific (populated by configure.sh, never committed) ─────────────
cluster:
  infraID: ""
  apiUrl: ""
  apiDomain: ""
  domain: ""
  region: us-east-2     # RHPDS always deploys to us-east-2
  platform: AWS

aws:
  ami: ""
  guid: ""
  uuid: ""
  az: ""                # auto-detected by configure.sh — do NOT hardcode

deployer:
  domain: ""            # same as cluster.domain

certManager:
  issuerName: letsencrypt-production-ec2
  email: rhpds-admins@redhat.com
  route53:
    accessKeyID: ""     # populated by configure.sh, never committed
    hostedZoneID: ""    # populated by configure.sh, never committed
    region: us-east-2
    credentialsSecretName: cert-manager-aws-creds
  dnsZones: []          # populated by configure.sh

# ── Feature flags ─────────────────────────────────────────────────────────────
# Set to false to skip deployment entirely (operator + instance both disabled).
# The rest of the stack (RHOAI, MaaS API, Kuadrant, models) is unaffected.
# Re-enable when multi-user login via Keycloak is needed.
keycloak:
  enabled: false

# ── Fixed across all deployments ──────────────────────────────────────────────
users:
  count: 2
  prefix: user

slack:
  botToken: "REPLACE_ME_DO_NOT_COMMIT"

# ── LiteMaaS ──────────────────────────────────────────────────────────────────
# Self-service LLM subscription and API key management portal.
# Secrets are generated by configure.sh and stored only on the cluster.
# Change namespace to "litemaas" once validated in litemaas-test.
litemaas:
  namespace: litemaas-test
  version: "0.4.0"
  existingSecret: litemaas-secrets
  oauthClientId: litemaas-oauth-client
  # Set to "0" for RHPDS clusters which use self-signed TLS certificates.
  nodeTlsRejectUnauthorized: "0"
  # OpenShift users who receive the LiteMaaS admin role.
  adminUsers:
    - admin
